<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Coastarian is coming soon.">
  <title>Coastarian | Coming Soon</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --shell: #fff8ea;
      --foam: #c7f2e7;
      --coral: #f17b63;
      --gold: #e8b85d;
      --deep: #061b1d;
      --reef: #0b6965;
      --ink: #f9f0dc;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "DM Sans", Arial, sans-serif;
      color: var(--ink);
      background: var(--deep);
      overflow: hidden;
    }

    .holding-page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1.5rem, 4vw, 4rem);
      isolation: isolate;
    }

    .holding-page::before {
      content: "";
      position: absolute;
      inset: -2.5%;
      z-index: -3;
      background-image: url("images/kenyan-coast-hero.png");
      background-size: cover;
      background-position: center;
      transform: scale(1.02);
      animation: coastal-breeze 18s ease-in-out infinite alternate;
    }

    .tree-motion,
    .tree-motion::before,
    .tree-motion::after,
    .water-motion,
    .water-motion::before,
    .water-motion::after {
      position: absolute;
      z-index: -1;
      pointer-events: none;
    }

    .tree-motion {
      inset: 0;
      overflow: hidden;
    }

    .tree-motion::before,
    .tree-motion::after {
      content: "";
      inset: -2.5%;
      background-image: url("images/kenyan-coast-hero.png");
      background-size: cover;
      background-position: center;
      filter: saturate(1.08) contrast(1.02) blur(0.4px);
      mix-blend-mode: screen;
    }

    .tree-motion::before {
      opacity: 0.16;
      transform-origin: 86% 62%;
      animation: palm-sway 4.8s ease-in-out infinite;
      -webkit-mask-image: radial-gradient(ellipse at 82% 28%, #000 0 28%, rgba(0, 0, 0, 0.68) 42%, transparent 64%);
      mask-image: radial-gradient(ellipse at 82% 28%, #000 0 28%, rgba(0, 0, 0, 0.68) 42%, transparent 64%);
    }

    .tree-motion::after {
      animation: frond-gust 5.8s ease-in-out infinite reverse;
      opacity: 0.13;
      transform-origin: 83% 78%;
      -webkit-mask-image: radial-gradient(ellipse at 86% 66%, #000 0 24%, rgba(0, 0, 0, 0.62) 40%, transparent 62%);
      mask-image: radial-gradient(ellipse at 86% 66%, #000 0 24%, rgba(0, 0, 0, 0.62) 40%, transparent 62%);
    }

    .water-motion {
      inset: 0;
      overflow: hidden;
    }

    .water-motion::before,
    .water-motion::after {
      content: "";
      left: -10%;
      width: 88%;
      height: 12%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.56) 0 1.5%, transparent 3%),
        linear-gradient(90deg, transparent, rgba(223, 247, 241, 0.64), rgba(255, 249, 237, 0.58), transparent);
      filter: blur(8px);
      mix-blend-mode: screen;
      transform: rotate(-3deg);
      opacity: 0.5;
    }

    .water-motion::before {
      top: 72%;
      animation: shoreline-lap 6.5s ease-in-out infinite;
      -webkit-mask-image: linear-gradient(180deg, transparent 0, #000 34%, #000 64%, transparent 100%);
      mask-image: linear-gradient(180deg, transparent 0, #000 34%, #000 64%, transparent 100%);
    }

    .water-motion::after {
      top: 69%;
      animation: shoreline-ripple 9s ease-in-out infinite;
      opacity: 0.34;
      filter: blur(14px);
      -webkit-mask-image: linear-gradient(180deg, transparent 0, #000 42%, transparent 92%);
      mask-image: linear-gradient(180deg, transparent 0, #000 42%, transparent 92%);
    }

    .holding-page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(6, 22, 22, 0.76), rgba(6, 22, 22, 0.34) 48%, rgba(6, 22, 22, 0.16)),
        linear-gradient(180deg, rgba(6, 22, 22, 0.2), rgba(6, 22, 22, 0.58));
    }

    .content {
      width: min(100%, 980px);
      display: grid;
      justify-items: start;
      gap: 1.25rem;
    }

    .brand-kicker {
      position: absolute;
      left: clamp(1.5rem, 4vw, 4rem);
      bottom: clamp(1.25rem, 3vw, 2.5rem);
      color: rgba(249, 240, 220, 0.74);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 5px 22px rgba(0, 0, 0, 0.4);
    }

    .brand-mark {
      position: absolute;
      top: clamp(1.25rem, 3vw, 2.5rem);
      left: clamp(1.5rem, 4vw, 4rem);
      z-index: 1;
      width: clamp(2.1rem, 3.2vw, 2.65rem);
      display: block;
      height: auto;
      opacity: 0.95;
      filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.34));
    }

    h1 {
      max-width: 9ch;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 8.5rem;
      font-weight: 600;
      line-height: 0.86;
      letter-spacing: 0;
      text-wrap: balance;
      color: var(--ink);
      text-shadow: 0 8px 34px rgba(0, 0, 0, 0.42);
    }

    .brand-line {
      width: min(100%, 21rem);
      height: 1px;
      margin-top: 0.25rem;
      background: linear-gradient(90deg, var(--coral), rgba(232, 184, 93, 0.82), rgba(199, 242, 231, 0));
      box-shadow: 0 7px 24px rgba(241, 123, 99, 0.28);
    }

    .coming-soon {
      color: rgba(199, 242, 231, 0.88);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 5px 22px rgba(0, 0, 0, 0.4);
    }

    @keyframes coastal-breeze {
      from {
        transform: scale(1.02) translate3d(-0.7%, 0, 0);
      }
      to {
        transform: scale(1.055) translate3d(0.7%, -0.4%, 0);
      }
    }

    @keyframes palm-sway {
      0%,
      100% {
        transform: scale(1.025) translate3d(0, 0, 0) skewX(0deg) rotate(0deg);
      }
      45% {
        transform: scale(1.04) translate3d(0.95%, -0.35%, 0) skewX(-1.9deg) rotate(-0.45deg);
      }
      70% {
        transform: scale(1.035) translate3d(0.25%, 0.15%, 0) skewX(0.8deg) rotate(0.2deg);
      }
    }

    @keyframes frond-gust {
      0%,
      100% {
        transform: translate3d(0, 0, 0) skewX(0deg) rotate(0deg);
      }
      40% {
        transform: translate3d(1.35%, -0.45%, 0) skewX(-3.2deg) rotate(-0.75deg);
      }
      72% {
        transform: translate3d(-0.25%, 0.18%, 0) skewX(1.4deg) rotate(0.28deg);
      }
    }

    @keyframes shoreline-lap {
      0%,
      100% {
        transform: translate3d(-3%, 1.1%, 0) rotate(-3deg) scaleX(0.94);
        opacity: 0.2;
      }
      46% {
        transform: translate3d(5%, -1.2%, 0) rotate(-3deg) scaleX(1.08);
        opacity: 0.48;
      }
      70% {
        transform: translate3d(2%, -0.35%, 0) rotate(-3deg) scaleX(1.02);
        opacity: 0.34;
      }
    }

    @keyframes shoreline-ripple {
      0%,
      100% {
        transform: translate3d(2%, 0.4%, 0) rotate(-3deg) scaleX(1);
      }
      50% {
        transform: translate3d(9%, -0.8%, 0) rotate(-3deg) scaleX(1.14);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .holding-page::before,
      .tree-motion,
      .tree-motion::before,
      .tree-motion::after,
      .water-motion::before,
      .water-motion::after {
        animation: none;
      }
    }

    @media (max-width: 980px) {
      h1 {
        font-size: 6.4rem;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .holding-page {
        min-height: 100svh;
        align-items: end;
        padding: 1.25rem;
      }

      .holding-page::before {
        background-position: 58% center;
      }

      .tree-motion,
      .tree-motion::before,
      .tree-motion::after {
        background-position: 58% center;
      }

      .tree-motion::before,
      .tree-motion::after {
        opacity: 0.12;
      }

      .water-motion::before,
      .water-motion::after {
        left: -22%;
        width: 104%;
        top: 72%;
      }

      .holding-page::after {
        background:
          linear-gradient(180deg, rgba(6, 22, 22, 0.1), rgba(6, 22, 22, 0.72) 66%, rgba(6, 22, 22, 0.9)),
          linear-gradient(90deg, rgba(6, 22, 22, 0.36), rgba(6, 22, 22, 0.16));
      }

      .content {
        padding-bottom: clamp(1rem, 7vh, 4rem);
        gap: 1rem;
      }

      .brand-mark {
        top: 1.25rem;
        left: 1.25rem;
        width: 2.25rem;
      }

      .brand-kicker {
        left: 1.25rem;
        bottom: 1rem;
        font-size: 0.62rem;
        letter-spacing: 0.16em;
      }

      h1 {
        max-width: 8ch;
        font-size: 4.7rem;
        line-height: 0.9;
      }

      .brand-line {
        width: 15rem;
      }

      .coming-soon {
        font-size: 0.82rem;
        letter-spacing: 0.17em;
      }
    }
  </style>
</head>
<body>
  <main class="holding-page" aria-label="Coastarian.com coming soon">
    <span class="water-motion" aria-hidden="true"></span>
    <span class="tree-motion" aria-hidden="true"></span>
    <img class="brand-mark" src="images/monogram-c-main-aqua.png" alt="Coastarian monogram">
    <section class="content">
      <p class="brand-kicker">Coastarian.com</p>
      <h1>Coastarian</h1>
      <span class="brand-line" aria-hidden="true"></span>
      <span class="coming-soon">Coming soon</span>
    </section>
  </main>
</body>
</html>
